# Defaults for sfs-maintain (WS12 12.7).  Installed to /etc/sfs/maintain.conf.
#
# Which maintenance passes to run, in order (evict trim defrag).
SFS_MAINTAIN_OPS="evict trim"

# Optional retention horizon for the evict pass, in seconds.  Empty = let the
# container's eviction_code (header) drive retention (recommended).  Set e.g.
# 604800 to force a 7-day horizon regardless of policy code.
SFS_MAINTAIN_EVICT_NOW=""

# Path inside the mount to act on (default: the mount root).
SFS_MAINTAIN_TARGET="."

# sfsctl binary location.
SFSCTL=/usr/local/sbin/sfsctl
