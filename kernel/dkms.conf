PACKAGE_NAME="sfs"
PACKAGE_VERSION="0.1"
BUILT_MODULE_NAME[0]="sfs"
DEST_MODULE_LOCATION[0]="/kernel/fs/sfs"
AUTOINSTALL="yes"
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
# Secure Boot: MOK-sign the freshly built module (opt-in; no-op without a key).
# The module autoloads on `mount -t sfs` via MODULE_ALIAS_FS("sfs") in
# sfs_super.c, so no modules-load.d alias is needed.
POST_BUILD="dkms-sign-hook.sh"
