# cargo-deny configuration for the sfs workspace (DH-5).
#
# Policy for security advisories + a permissive license allow-list. It is a
# manual release gate until a dedicated hosted-CI job is added. The ONLY
# copyleft exception is the optional WinFsp binding
# (GPL-3.0), which is never in a default build — it is gated behind the
# `winfsp` feature of sfs-mount and documented as such.

[graph]
# Match the platforms we actually ship/test.  This keeps the license/advisory
# scope to real dependencies rather than every optional cfg target.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
# Fail the build on any security vulnerability.  yanked crates are also flagged.
yanked = "deny"
# Targeted, documented exceptions for un-actionable *unmaintained* notices on
# transitive deps with no available upgrade.  Vulnerabilities are NEVER ignored,
# and any NEW unmaintained advisory still fails the build (surfacing it for a
# fresh decision).
ignore = [
    # `paste` (proc-macro) is unmaintained; pulled in transitively (e.g. via the
    # QUIC/metrics stack).  No functional risk; no maintained drop-in.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; transitive, no upgrade path" },
    # `rustls-pemfile` folded into rustls-pki-types; axum-server 0.7 still depends
    # on it.  Notice only; upgrade blocked until axum-server bumps.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; blocked on axum-server" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
# GPL-3.0 is allowed ONLY for the optional WinFsp binding crates.  These are
# never present in a default (MIT/Apache) build; enabling `--features winfsp`
# makes that specific build GPL-3.0, which is the documented boundary.
# (The crates declare the deprecated "GPL-3.0" identifier; match it verbatim.)
exceptions = [
    { name = "winfsp", allow = ["GPL-3.0"] },
    { name = "winfsp-sys", allow = ["GPL-3.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
